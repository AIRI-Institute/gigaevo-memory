  /v1/search/unified:
    post:
      description: "Unified search endpoint supporting BM25, vector, and hybrid search.\n\
        \nThis endpoint provides a single interface for three search types:\n- **bm25**:\
        \ Full-text search using PostgreSQL tsvector\n- **vector**: Semantic search\
        \ using pgvector similarity\n- **hybrid**: Combined BM25 + Vector scores with\
        \ configurable weights\n\nFor vector and hybrid search, embeddings can be\
        \ generated server-side\n(if ENABLE_VECTOR_SEARCH=true) or provided as pre-computed\
        \ vectors.\n\nExample BM25 request:\n    {\n        \"search_type\": \"bm25\"\
        ,\n        \"query\": \"financial analysis\",\n        \"top_k\": 10,\n  \
        \      \"entity_type\": \"memory_card\"\n    }\n\nExample vector request (server-side\
        \ embedding):\n    {\n        \"search_type\": \"vector\",\n        \"query\"\
        : \"semantic similarity\",\n        \"top_k\": 10,\n        \"entity_type\"\
        : \"memory_card\"\n    }\n\nExample hybrid request:\n    {\n        \"search_type\"\
        : \"hybrid\",\n        \"query\": \"analysis\",\n        \"hybrid_weights\"\
        : [0.3, 0.7],\n        \"top_k\": 10,\n        \"entity_type\": \"memory_card\"\
        \n    }\n\nExample vector request (client-side embedding):\n    {\n      \
        \  \"search_type\": \"vector\",\n        \"query_vector\": [0.1, 0.2, ...],\n\
        \        \"top_k\": 10,\n        \"entity_type\": \"memory_card\"\n    }"
      operationId: unified_search_v1_search_unified_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnifiedSearchRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnifiedSearchResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Unified Search
      tags:
      - search
