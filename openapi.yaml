  /v1/search/batch:
    post:
      description: "Batch search for multiple queries.\n\nEfficiently processes multiple\
        \ queries in parallel using asyncio.gather.\nReturns a list of result lists,\
        \ one per query.\n\nExample request:\n    {\n        \"search_type\": \"hybrid\"\
        ,\n        \"queries\": [\"financial analysis\", \"code review\", \"documentation\"\
        ],\n        \"top_k\": 5,\n        \"entity_type\": \"memory_card\",\n   \
        \     \"hybrid_weights\": [0.4, 0.6]\n    }"
      operationId: batch_search_v1_search_batch_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchSearchRequest'
        required: true
      responses:
