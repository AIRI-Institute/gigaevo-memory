    post:
      description: "Persist a mixed list of entities in a single request.\n\nUsed\
        \ by CARE's `care import` (and any future migration / batch-load\ntooling).\
        \ Items are processed in submission order with per-item\nerror isolation by\
        \ default \u2014 a failure at index 3 doesn't roll back\nindex 0\u20132. Pass\
        \ `stop_on_error=True` to abort on the first failure.\n\nWhen the caller is\
        \ authenticated (i.e. an `X-API-Key` header was\nsupplied and validated) and\
        \ an item omits `meta.namespace`, the\nserver defaults the item's namespace\
        \ to `auth.owner`. This is the\nauto-namespacing path that makes CARE's `care\
        \ import` work out of\nthe box without each chain needing an explicit namespace.\n\
        \nReturns a per-item results array so the client can correlate\nsuccesses\
        \ with their input positions."
      operationId: bulk_save_v1_bulk_save_post
      parameters:
      - in: header
        name: X-API-Key
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      - in: header
        name: authorization
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkSaveRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkSaveResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Bulk Save
      tags:
      - bulk
