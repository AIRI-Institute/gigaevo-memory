components:
  schemas:
    AgentPageResponse:
      properties:
        has_more:
          default: false
          title: Has More
          type: boolean
        items:
          items:
            $ref: '#/components/schemas/AgentResponse'
          title: Items
          type: array
        next_cursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Next Cursor
      title: AgentPageResponse
      type: object
    AgentResponse:
      properties:
        channel:
          title: Channel
          type: string
        content:
          additionalProperties: true
          title: Content
          type: object
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
        entity_id:
          title: Entity Id
          type: string
        entity_type:
          const: agent
          default: agent
          title: Entity Type
          type: string
        etag:
          title: Etag
          type: string
        favourite:
          default: false
          title: Favourite
          type: boolean
        last_run_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Last Run At
        meta:
          additionalProperties: true
          title: Meta
          type: object
        run_count:
          default: 0
          title: Run Count
          type: integer
        version_id:
          title: Version Id
          type: string
        version_number:
          anyOf:
          - type: integer
          - type: 'null'
          title: Version Number
      required:
      - entity_id
      - version_id
      - channel
      - etag
      - meta
      - content
      title: AgentResponse
      type: object
    AgentSkillPageResponse:
      properties:
        has_more:
          default: false
          title: Has More
          type: boolean
        items:
          items:
            $ref: '#/components/schemas/AgentSkillResponse'
          title: Items
          type: array
        next_cursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Next Cursor
      title: AgentSkillPageResponse
      type: object
    AgentSkillResponse:
      properties:
        channel:
          title: Channel
          type: string
        content:
          additionalProperties: true
          title: Content
          type: object
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
        entity_id:
          title: Entity Id
          type: string
        entity_type:
          const: agent_skill
          default: agent_skill
          title: Entity Type
          type: string
        etag:
          title: Etag
          type: string
        favourite:
          default: false
          title: Favourite
          type: boolean
        last_run_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Last Run At
        meta:
          additionalProperties: true
          title: Meta
          type: object
        run_count:
          default: 0
          title: Run Count
          type: integer
        version_id:
          title: Version Id
          type: string
        version_number:
          anyOf:
          - type: integer
          - type: 'null'
          title: Version Number
      required:
      - entity_id
      - version_id
      - channel
      - etag
      - meta
      - content
      title: AgentSkillResponse
      type: object
    BatchSearchRequest:
      description: Request for batch search.
      properties:
        channel:
          default: latest
          description: Version channel to search
          title: Channel
          type: string
        document_kind:
          anyOf:
          - type: string
          - type: 'null'
          description: Optional indexed search document kind to query
          title: Document Kind
        entity_type:
          default: memory_card
          description: Type of entity to search
          title: Entity Type
          type: string
        excludes_tool:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: 'For agent_skill search only: exclude hits with ANY listed
            allowed_tools token'
          title: Excludes Tool
        hybrid_weights:
          default:
          - 0.5
          - 0.5
          maxItems: 2
          minItems: 2
          prefixItems:
          - type: number
          - type: number
          title: Hybrid Weights
          type: array
        namespace:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by namespace
          title: Namespace
        queries:
          description: List of search queries
          items:
            type: string
          maxItems: 50
          minItems: 1
          title: Queries
          type: array
        query_vectors:
          anyOf:
          - items:
              items:
                type: number
              type: array
            type: array
          - type: 'null'
          description: Pre-computed embedding vectors for vector search
          title: Query Vectors
        requires_tool:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: 'For agent_skill search only: require ALL listed allowed_tools
            tokens'
          title: Requires Tool
        search_type:
          $ref: '#/components/schemas/SearchType'
          default: bm25
          description: Type of search
        tags:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: Filter by tags
          title: Tags
        top_k:
          default: 10
          description: Number of top results per query
          maximum: 100.0
          minimum: 1.0
          title: Top K
          type: integer
      required:
      - queries
      title: BatchSearchRequest
      type: object
    BatchSearchResponseModel:
      description: Response for batch search.
      properties:
        results:
          items:
            items:
              $ref: '#/components/schemas/SearchHit'
            type: array
          title: Results
          type: array
        search_type:
          $ref: '#/components/schemas/SearchType'
        total_queries:
          title: Total Queries
          type: integer
      required:
      - results
      - search_type
      - total_queries
      title: BatchSearchResponseModel
      type: object
    BulkSaveItem:
      description: 'One entity to persist in a bulk-save request.


        Carries `entity_type` (selects the routing) plus the same payload

        shape as `EntityCreateRequest` / `EntityUpdateRequest`. When

        `entity_id` is set, the item is upserted as a new version on that

        entity; otherwise a new entity is created.'
      properties:
        change_summary:
          anyOf:
          - type: string
          - type: 'null'
          description: Only used on the update path (when `entity_id` is set).
          title: Change Summary
        channel:
          default: latest
          title: Channel
          type: string
        content:
          additionalProperties: true
          title: Content
          type: object
        embedding:
          anyOf:
          - items:
              type: number
            type: array
          - type: 'null'
          title: Embedding
        entity_id:
          anyOf:
          - type: string
          - type: 'null'
          description: Set to upsert (creates a new version on the existing entity);
            omit to create a new entity.
          title: Entity Id
        entity_type:
          description: One of `step | chain | agent | agent_skill | memory_card` (singular
            form, matches `VALID_ENTITY_TYPES` values).
          title: Entity Type
          type: string
        evolution_meta:
          anyOf:
          - $ref: '#/components/schemas/EvolutionMeta'
          - type: 'null'
        meta:
          $ref: '#/components/schemas/EntityMeta'
        parent_version_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Parent Version Id
      required:
      - entity_type
      - meta
      - content
      title: BulkSaveItem
      type: object
    BulkSaveItemResult:
      description: 'Per-item outcome inside a `BulkSaveResponse`.


        On success: `entity_ref` carries the persisted entity_id +

        version_id. On failure: `error` carries a short message and the

        response is otherwise empty.'
      properties:
        entity_ref:
          anyOf:
          - additionalProperties:
              type: string
            type: object
          - type: 'null'
          description: '`{entity_id, entity_type, version_id, channel}` when `success=True`.
            Shape mirrors the typed-router responses so callers can drive follow-up
            requests without a separate GET.'
          title: Entity Ref
        error:
          anyOf:
          - type: string
          - type: 'null'
          description: Short, human-readable failure reason when `success=False`.
          title: Error
        index:
          description: 0-based position in the request `items` array.
          title: Index
          type: integer
        success:
          title: Success
          type: boolean
      required:
      - index
      - success
      title: BulkSaveItemResult
      type: object
    BulkSaveRequest:
      description: 'Body for `POST /v1/bulk/save`.


        Designed for CARE''s `care import ./generated_chains/*.json` flow:

        a mixed list of entities (chains + agents + skills + memory_cards)

        submitted in one request to amortise HTTP round-trips. The server

        walks the list, persisting each item in its own transaction;

        per-item failures don''t poison earlier successes.'
      properties:
        items:
          description: Up to 500 entities per call.
          items:
            $ref: '#/components/schemas/BulkSaveItem'
          maxItems: 500
          minItems: 1
          title: Items
          type: array
        stop_on_error:
          default: false
          description: "When `False` (default), keep going after a failure and report\
            \ per-item results. When `True`, abort the batch on the first failure\
            \ \u2014 useful for atomic-feeling imports where partial success is worse\
            \ than no success."
          title: Stop On Error
          type: boolean
      required:
      - items
      title: BulkSaveRequest
      type: object
    BulkSaveResponse:
      description: Aggregate outcome for `POST /v1/bulk/save`.
      properties:
        error_count:
          default: 0
          title: Error Count
          type: integer
        results:
          items:
            $ref: '#/components/schemas/BulkSaveItemResult'
          title: Results
          type: array
        success_count:
          default: 0
          title: Success Count
          type: integer
      title: BulkSaveResponse
      type: object
    ChainPageResponse:
      properties:
        has_more:
          default: false
          title: Has More
          type: boolean
        items:
          items:
            $ref: '#/components/schemas/ChainResponse'
          title: Items
          type: array
        next_cursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Next Cursor
      title: ChainPageResponse
      type: object
    ChainResponse:
      properties:
        channel:
          title: Channel
          type: string
        content:
          additionalProperties: true
          title: Content
          type: object
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
        entity_id:
          title: Entity Id
          type: string
        entity_type:
          const: chain
          default: chain
          title: Entity Type
          type: string
        etag:
          title: Etag
          type: string
        favourite:
          default: false
          title: Favourite
          type: boolean
        last_run_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Last Run At
        meta:
          additionalProperties: true
          title: Meta
          type: object
        run_count:
          default: 0
          title: Run Count
          type: integer
        version_id:
          title: Version Id
          type: string
        version_number:
          anyOf:
          - type: integer
          - type: 'null'
          title: Version Number
      required:
      - entity_id
      - version_id
      - channel
      - etag
      - meta
      - content
      title: ChainResponse
      type: object
    DifferentialChannelView:
      description: "Versions that beat a baseline channel on a specific objective.\n\
        \nPowered by `GET /v1/chains/{id}/versions/beating`. CARE renders\nthis as\
        \ a \"candidates for promotion\" list \u2014 versions that\noutperform the\
        \ currently-pinned `stable` channel on the chosen\nobjective and may be worth\
        \ a manual promotion decision.\n\n``objective`` selects which metric to compare:\n\
        \n* ``\"fitness_score\"`` (default) reads ``evolution_meta.fitness_score``,\n\
        \  falling back to the legacy gigaevo-core ``fitness`` alias.\n* Any other\
        \ string is looked up in ``evolution_meta.objectives``\n  (e.g. ``\"accuracy\"\
        ``, ``\"latency_ms\"``)."
      properties:
        baseline_channel:
          title: Baseline Channel
          type: string
        baseline_value:
          anyOf:
          - type: number
          - type: 'null'
          description: "The baseline channel's recorded value for the chosen objective.\
            \ ``None`` when no value is available \u2014 in that case ``winners``\
            \ is also empty (the comparison is ill-defined)."
          title: Baseline Value
        baseline_version_id:
          anyOf:
          - type: string
          - type: 'null'
          description: Version currently pinned to ``baseline_channel``. ``None``
            when the channel isn't pinned for this entity.
          title: Baseline Version Id
        entity_id:
          title: Entity Id
          type: string
        objective:
          title: Objective
          type: string
        winners:
          items:
            $ref: '#/components/schemas/VersionScore'
          title: Winners
          type: array
      required:
      - entity_id
      - baseline_channel
      - objective
      title: DifferentialChannelView
      type: object
    DuplicateMember:
      description: One side of a near-duplicate pair.
      properties:
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
        entity_id:
          title: Entity Id
          type: string
        name:
          title: Name
          type: string
        namespace:
          anyOf:
          - type: string
          - type: 'null'
          title: Namespace
        version_id:
          title: Version Id
          type: string
      required:
      - entity_id
      - version_id
      - name
      title: DuplicateMember
      type: object
    DuplicatePair:
      description: 'A pair of entities flagged as semantically near-duplicate.


        The pair is canonicalised: ``entity_a.entity_id < entity_b.entity_id``

        (lexicographic UUID order), so a deduplication walker can assume

        each unordered pair appears at most once in the response.'
      properties:
        entity_a:
          $ref: '#/components/schemas/DuplicateMember'
        entity_b:
          $ref: '#/components/schemas/DuplicateMember'
        similarity:
          description: "Cosine similarity in [0, 1]. Strictly \u2265 the response's\
            \ `threshold`."
          maximum: 1.0
          minimum: 0.0
          title: Similarity
          type: number
        suggestion:
          default: merge
          description: "Hint for catalogue maintenance \u2014 currently always `merge`."
          title: Suggestion
          type: string
      required:
      - entity_a
      - entity_b
      - similarity
      title: DuplicatePair
      type: object
    DuplicatesResponse:
      description: "Near-duplicate pairs returned by\n`GET /v1/{entity_type}/duplicates`.\
        \ CARE / MAGE use it for\ncatalogue hygiene \u2014 surface chains or skills\
        \ that drift toward\neach other so a human can merge them.\n\nRequires the\
        \ deployment to have ``ENABLE_VECTOR_SEARCH=true``\n(the endpoint 503s otherwise).\
        \ Pairs are ordered by descending\nsimilarity so the most likely merge candidates\
        \ surface first."
      properties:
        channel:
          title: Channel
          type: string
        entity_type:
          title: Entity Type
          type: string
        pairs:
          items:
            $ref: '#/components/schemas/DuplicatePair'
          title: Pairs
          type: array
        threshold:
          description: Minimum cosine similarity used to filter pairs (inclusive).
          maximum: 1.0
          minimum: 0.0
          title: Threshold
          type: number
      required:
      - entity_type
      - channel
      - threshold
      title: DuplicatesResponse
      type: object
    EmbeddingsRequest:
      description: Request for text embeddings.
      properties:
        model:
          anyOf:
          - type: string
          - type: 'null'
          description: Optional override of the default model
          title: Model
        texts:
          description: List of text strings to embed
          items:
            type: string
          maxItems: 100
          minItems: 1
          title: Texts
          type: array
      required:
      - texts
      title: EmbeddingsRequest
      type: object
    EmbeddingsResponse:
      description: Response with text embeddings.
      properties:
        dimension:
          description: Dimension of embedding vectors
          title: Dimension
          type: integer
        embeddings:
          description: List of embedding vectors, one per input text
          items:
            items:
              type: number
            type: array
          title: Embeddings
          type: array
        model:
          description: Model name used for embedding
          title: Model
          type: string
      required:
      - embeddings
      - model
      - dimension
      title: EmbeddingsResponse
      type: object
    EntityCreateRequest:
      properties:
        channel:
          default: latest
          title: Channel
          type: string
        content:
          additionalProperties: true
          title: Content
          type: object
        embedding:
          anyOf:
          - items:
              type: number
            type: array
          - type: 'null'
          title: Embedding
        evolution_meta:
          anyOf:
          - $ref: '#/components/schemas/EvolutionMeta'
          - type: 'null'
        meta:
          $ref: '#/components/schemas/EntityMeta'
        parent_version_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Parent Version Id
      required:
      - meta
      - content
      title: EntityCreateRequest
      type: object
    EntityMeta:
      properties:
        author:
          anyOf:
          - type: string
          - type: 'null'
          title: Author
        name:
          maxLength: 255
          minLength: 1
          title: Name
          type: string
        namespace:
          anyOf:
          - type: string
          - type: 'null'
          title: Namespace
        tags:
          items:
            type: string
          title: Tags
          type: array
        when_to_use:
          anyOf:
          - type: string
          - type: 'null'
          title: When To Use
      required:
      - name
      title: EntityMeta
      type: object
    EntityPatchRequest:
      description: "Body for PATCH /v1/{type}/{id} \u2014 partial update of CARE-mutable\n\
        entity-level fields. Does NOT create a new version."
      properties:
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        display_name:
          anyOf:
          - maxLength: 200
            type: string
          - type: 'null'
          title: Display Name
        favourite:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Favourite
        tags:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Tags
      title: EntityPatchRequest
      type: object
    EntityResponse:
      properties:
        channel:
          title: Channel
          type: string
        content:
          additionalProperties: true
          title: Content
          type: object
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
        entity_id:
          title: Entity Id
          type: string
        entity_type:
          title: Entity Type
          type: string
        etag:
          title: Etag
          type: string
        favourite:
          default: false
          title: Favourite
          type: boolean
        last_run_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Last Run At
        meta:
          additionalProperties: true
          title: Meta
          type: object
        run_count:
          default: 0
          title: Run Count
          type: integer
        version_id:
          title: Version Id
          type: string
        version_number:
          anyOf:
          - type: integer
          - type: 'null'
          title: Version Number
      required:
      - entity_type
      - entity_id
      - version_id
      - channel
      - etag
      - meta
      - content
      title: EntityResponse
      type: object
    EntityUpdateRequest:
      properties:
        change_summary:
          anyOf:
          - type: string
          - type: 'null'
          title: Change Summary
        channel:
          default: latest
          title: Channel
          type: string
        content:
          additionalProperties: true
          title: Content
          type: object
        embedding:
          anyOf:
          - items:
              type: number
            type: array
          - type: 'null'
          title: Embedding
        evolution_meta:
          anyOf:
          - $ref: '#/components/schemas/EvolutionMeta'
          - type: 'null'
        meta:
          anyOf:
          - $ref: '#/components/schemas/EntityMeta'
          - type: 'null'
        parent_version_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Parent Version Id
      required:
      - content
      title: EntityUpdateRequest
      type: object
    EvolutionMeta:
      description: "Provenance + fitness metadata for an entity version produced by\n\
        an evolutionary run (gigaevo-core / gigaevo-platform / CARE).\n\nTwo concentric\
        \ schemas live here:\n\n* **CARE / gigaevo-platform shape** (P1 \xA75, standardised\
        \ 2026-05-16):\n  ``parent_version_ids`` (UUIDs of the parents this version\
        \ was\n  mutated/crossed from), ``fitness_score`` (single-objective\n  scalar\
        \ in [0, 1] or wider \u2014 depends on fitness function),\n  ``generation``\
        \ (0-indexed generation number), ``experiment_id``\n  (the parent evolution\
        \ run), ``objectives`` (multi-objective dict,\n  e.g. ``{\"accuracy\": 0.91,\
        \ \"latency_ms\": 1240, \"tokens\": 4200}``),\n  ``mutation_kind`` (free string;\
        \ typical values:\n  ``\"step_swap\"``, ``\"prompt_rewrite\"``, ``\"topology_change\"\
        ``,\n  ``\"crossover\"``, ``\"manual_edit\"``).\n* **Legacy gigaevo-core shape**\
        \ (pre-2026-05): ``prompt_ref``,\n  ``fitness``, ``is_valid``, ``metrics``,\
        \ ``behavioral_descriptors``.\n  Kept for backward compat \u2014 pre-existing\
        \ rows decode without\n  reshape. New callers should prefer the standardised\
        \ fields.\n\nEvery field is optional. Empty ``EvolutionMeta()`` is legal."
      properties:
        behavioral_descriptors:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Behavioral Descriptors
        experiment_id:
          anyOf:
          - type: string
          - type: 'null'
          description: Identifier for the parent gigaevo-platform experiment.
          title: Experiment Id
        fitness:
          anyOf:
          - type: number
          - type: 'null'
          description: Legacy alias for `fitness_score`. New callers prefer `fitness_score`.
          title: Fitness
        fitness_score:
          anyOf:
          - type: number
          - type: 'null'
          description: Single-objective scalar. Range depends on fitness function.
          title: Fitness Score
        generation:
          anyOf:
          - minimum: 0.0
            type: integer
          - type: 'null'
          description: Zero-indexed generation number within the experiment.
          title: Generation
        is_valid:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Is Valid
        metrics:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Metrics
        mutation_kind:
          anyOf:
          - type: string
          - type: 'null'
          description: 'Mutation/cross-over kind that produced this version. Typical
            values: "step_swap", "prompt_rewrite", "topology_change", "crossover",
            "manual_edit".'
          title: Mutation Kind
        objectives:
          anyOf:
          - additionalProperties:
              type: number
            type: object
          - type: 'null'
          description: "Multi-objective fitness dict \u2014 e.g. {\"accuracy\": 0.91,\
            \ \"latency_ms\": 1240, \"tokens\": 4200}."
          title: Objectives
        parent_version_ids:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: "UUIDs of the parent versions this version was derived from.\
            \ Single-parent mutation has length 1; crossover has length \u2265 2."
          title: Parent Version Ids
        prompt_ref:
          anyOf:
          - type: string
          - type: 'null'
          title: Prompt Ref
      title: EvolutionMeta
      type: object
    FacetsResponse:
      properties:
        authors:
          additionalProperties:
            type: integer
          title: Authors
          type: object
        entity_types:
          additionalProperties:
            type: integer
          title: Entity Types
          type: object
        namespaces:
          additionalProperties:
            type: integer
          title: Namespaces
          type: object
        tags:
          additionalProperties:
            type: integer
          title: Tags
          type: object
      title: FacetsResponse
      type: object
    FavouriteRequest:
      description: "Body for POST /v1/{type}/{id}/favourite \u2014 toggle or set the\
        \ flag."
      properties:
        favourite:
          default: true
          title: Favourite
          type: boolean
      title: FavouriteRequest
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    LineageResponse:
      description: "Ancestry DAG starting from a specific version (the ``root``).\n\
        \nVersions are returned in BFS order (root first, then its parents,\nthen\
        \ their parents, \u2026), de-duplicated by ``version_id``. ``depth``\non each\
        \ node lets clients render layers without re-walking."
      properties:
        entity_id:
          title: Entity Id
          type: string
        max_depth_reached:
          default: false
          description: True when the BFS hit ``max_depth`` and didn't fully expand
            all parents. The client may re-issue with a larger ``max_depth`` to walk
            further.
          title: Max Depth Reached
          type: boolean
        root_version_id:
          title: Root Version Id
          type: string
        versions:
          items:
            $ref: '#/components/schemas/LineageVersion'
          title: Versions
          type: array
      required:
      - entity_id
      - root_version_id
      title: LineageResponse
      type: object
    LineageVersion:
      description: 'A single node in an entity''s ancestry DAG.


        Returned by ``GET /v1/chains/{id}/lineage`` and used by CARE''s

        library evolution-tree visualisation. Carries the version''s own

        `parents` array so the client can rebuild the full DAG topology

        without re-fetching.'
      properties:
        author:
          anyOf:
          - type: string
          - type: 'null'
          title: Author
        change_summary:
          anyOf:
          - type: string
          - type: 'null'
          title: Change Summary
        created_at:
          format: date-time
          title: Created At
          type: string
        depth:
          default: 0
          description: "BFS depth from the requested root (0 = the root itself, 1\
            \ = its direct parents, \u2026). Convenient for layered rendering."
          title: Depth
          type: integer
        evolution_meta:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Evolution Meta
        parents:
          items:
            type: string
          title: Parents
          type: array
        version_id:
          title: Version Id
          type: string
        version_number:
          title: Version Number
          type: integer
      required:
      - version_id
      - version_number
      - created_at
      title: LineageVersion
      type: object
    MemoryCardPageResponse:
      properties:
        has_more:
          default: false
          title: Has More
          type: boolean
        items:
          items:
            $ref: '#/components/schemas/MemoryCardResponse'
          title: Items
          type: array
        next_cursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Next Cursor
      title: MemoryCardPageResponse
      type: object
    MemoryCardResponse:
      properties:
        channel:
          title: Channel
          type: string
        content:
          additionalProperties: true
          title: Content
          type: object
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
        entity_id:
          title: Entity Id
          type: string
        entity_type:
          const: memory_card
          default: memory_card
          title: Entity Type
          type: string
        etag:
          title: Etag
          type: string
        favourite:
          default: false
          title: Favourite
          type: boolean
        last_run_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Last Run At
        meta:
          additionalProperties: true
          title: Meta
          type: object
        run_count:
          default: 0
          title: Run Count
          type: integer
        version_id:
          title: Version Id
          type: string
        version_number:
          anyOf:
          - type: integer
          - type: 'null'
          title: Version Number
      required:
      - entity_id
      - version_id
      - channel
      - etag
      - meta
      - content
      title: MemoryCardResponse
      type: object
    PinRequest:
      properties:
        channel:
          title: Channel
          type: string
        version_id:
          title: Version Id
          type: string
      required:
      - channel
      - version_id
      title: PinRequest
      type: object
    PromoteRequest:
      properties:
        from_channel:
          default: latest
          title: From Channel
          type: string
        to_channel:
          default: stable
          title: To Channel
          type: string
      title: PromoteRequest
      type: object
    RecordRunRequest:
      description: 'Body for POST /v1/{type}/{id}/run-recorded.


        `run_id` is currently informational (will be used to dedupe

        accidental double-recordings via a short-lived in-memory LRU). The

        field is optional; clients can omit it.'
      properties:
        run_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Run Id
      title: RecordRunRequest
      type: object
    RevertRequest:
      properties:
        target_version_id:
          title: Target Version Id
          type: string
      required:
      - target_version_id
      title: RevertRequest
      type: object
    SearchHit:
      properties:
        channel:
          anyOf:
          - type: string
          - type: 'null'
          title: Channel
        content:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Content
        document_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Document Id
        document_kind:
          anyOf:
          - type: string
          - type: 'null'
          title: Document Kind
        entity_id:
          title: Entity Id
          type: string
        entity_type:
          title: Entity Type
          type: string
        name:
          title: Name
          type: string
        score:
          default: 0.0
          title: Score
          type: number
        snippet:
          anyOf:
          - type: string
          - type: 'null'
          title: Snippet
        tags:
          items:
            type: string
          title: Tags
          type: array
        version_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Version Id
        when_to_use:
          anyOf:
          - type: string
          - type: 'null'
          title: When To Use
      required:
