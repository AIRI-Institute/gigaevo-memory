                $ref: '#/components/schemas/BatchSearchResponseModel'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Batch Search
      tags:
      - search
  /v1/search/facets:
