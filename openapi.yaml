  /v1/{entity_type}/duplicates:
    get:
      description: 'Find near-duplicate pairs of a typed entity by cosine similarity.


        Pairs are canonicalised (``entity_a.entity_id < entity_b.entity_id``)

        so each unordered pair appears at most once. Sorted by descending

        similarity so the strongest merge candidates come first.


        * ``400`` when ``entity_type`` is not in ``VALID_ENTITY_TYPES``.

        * ``503`` when the deployment has vector search disabled.'
      operationId: find_duplicates_v1__entity_type__duplicates_get
      parameters:
      - in: path
        name: entity_type
        required: true
        schema:
          title: Entity Type
          type: string
      - description: Channel pointer to resolve each entity to one specific embedding.
        in: query
        name: channel
        required: false
        schema:
          default: latest
          description: Channel pointer to resolve each entity to one specific embedding.
          title: Channel
          type: string
      - description: "Minimum cosine similarity (inclusive) for a pair to qualify\
          \ as a near-duplicate. The TODO \xA74 spec calls out 0.95 as the default;\
          \ loosen it to 0.85 for exploratory inspection."
        in: query
        name: threshold
        required: false
        schema:
          default: 0.95
          description: "Minimum cosine similarity (inclusive) for a pair to qualify\
            \ as a near-duplicate. The TODO \xA74 spec calls out 0.95 as the default;\
            \ loosen it to 0.85 for exploratory inspection."
          maximum: 1.0
          minimum: 0.5
          title: Threshold
          type: number
      - description: Restrict the scan to one namespace. Omit to scan every entity
          of this type (useful for operator-level hygiene).
        in: query
        name: namespace
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Restrict the scan to one namespace. Omit to scan every entity
            of this type (useful for operator-level hygiene).
          title: Namespace
      - description: Maximum number of pairs returned.
        in: query
        name: limit
        required: false
        schema:
          default: 50
          description: Maximum number of pairs returned.
          maximum: 500
          minimum: 1
          title: Limit
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicatesResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Find Duplicates
      tags:
      - search
