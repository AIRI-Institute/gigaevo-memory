      - entity_type
      - name
      title: SearchHit
      type: object
    SearchType:
      description: Search algorithm type.
      enum:
      - bm25
      - vector
      - hybrid
      title: SearchType
      type: string
    StepPageResponse:
      properties:
        has_more:
          default: false
          title: Has More
          type: boolean
        items:
          items:
            $ref: '#/components/schemas/StepResponse'
          title: Items
          type: array
        next_cursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Next Cursor
      title: StepPageResponse
      type: object
    StepResponse:
      properties:
        channel:
          title: Channel
          type: string
        content:
          additionalProperties: true
          title: Content
          type: object
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
        entity_id:
          title: Entity Id
          type: string
        entity_type:
          const: step
          default: step
          title: Entity Type
          type: string
        etag:
          title: Etag
          type: string
        favourite:
          default: false
          title: Favourite
          type: boolean
        last_run_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Last Run At
        meta:
          additionalProperties: true
          title: Meta
          type: object
        run_count:
          default: 0
          title: Run Count
          type: integer
        version_id:
          title: Version Id
          type: string
        version_number:
          anyOf:
          - type: integer
          - type: 'null'
          title: Version Number
      required:
      - entity_id
      - version_id
      - channel
      - etag
      - meta
      - content
      title: StepResponse
      type: object
    UnifiedSearchRequest:
      description: Request for unified search (BM25, vector, or hybrid).
      properties:
        channel:
          default: latest
          description: Version channel to search
          title: Channel
          type: string
        document_kind:
          anyOf:
          - type: string
          - type: 'null'
          description: Optional indexed search document kind to query
          title: Document Kind
        entity_type:
          default: memory_card
          description: Type of entity to search
          title: Entity Type
          type: string
        excludes_tool:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: 'For agent_skill search only: exclude hits with ANY listed
            allowed_tools token'
          title: Excludes Tool
        hybrid_weights:
          default:
          - 0.5
          - 0.5
          description: (bm25_weight, vector_weight) for hybrid search, must sum to
            1.0
          maxItems: 2
          minItems: 2
          prefixItems:
          - type: number
          - type: number
          title: Hybrid Weights
          type: array
        namespace:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by namespace
          title: Namespace
        query:
          anyOf:
          - type: string
          - type: 'null'
          description: Text query for BM25, hybrid, or server-side vector search
          title: Query
        query_vector:
          anyOf:
          - items:
              type: number
            type: array
          - type: 'null'
          description: Pre-computed embedding vector for vector search
          title: Query Vector
        requires_tool:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: 'For agent_skill search only: require ALL listed allowed_tools
            tokens'
          title: Requires Tool
        search_type:
          $ref: '#/components/schemas/SearchType'
          default: bm25
          description: 'Type of search: ''bm25'', ''vector'', or ''hybrid'''
        tags:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: Filter by tags
          title: Tags
        top_k:
          default: 10
          description: Number of top results to return
          maximum: 100.0
          minimum: 1.0
          title: Top K
          type: integer
      title: UnifiedSearchRequest
      type: object
    UnifiedSearchResponse:
      description: Response for unified search (BM25, vector, or hybrid).
      properties:
        hits:
          items:
            $ref: '#/components/schemas/SearchHit'
          title: Hits
          type: array
        search_type:
          description: Type of search performed (bm25, vector, or hybrid)
          title: Search Type
          type: string
        total:
          description: Total number of hits returned
          title: Total
          type: integer
      required:
      - search_type
      - total
      title: UnifiedSearchResponse
      type: object
    ValidationError:
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
    VectorSearchRequest:
      description: Backward-compatible BYO-vector search request.
      properties:
        channel:
          default: latest
          title: Channel
          type: string
        entity_type:
          default: chain
          title: Entity Type
          type: string
        limit:
          default: 10
          maximum: 100.0
          minimum: 1.0
          title: Limit
          type: integer
        namespace:
          anyOf:
          - type: string
          - type: 'null'
          title: Namespace
        query_vector:
          items:
            type: number
          minItems: 1
          title: Query Vector
          type: array
        tags:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Tags
      required:
      - query_vector
      title: VectorSearchRequest
      type: object
    VectorSearchResponse:
      properties:
        hits:
          items:
            $ref: '#/components/schemas/SearchHit'
          title: Hits
          type: array
      title: VectorSearchResponse
      type: object
    VersionDetail:
      properties:
        author:
          anyOf:
          - type: string
          - type: 'null'
          title: Author
        change_summary:
          anyOf:
          - type: string
          - type: 'null'
          title: Change Summary
        content:
          additionalProperties: true
          title: Content
          type: object
        created_at:
          format: date-time
          title: Created At
          type: string
        entity_id:
          title: Entity Id
          type: string
        evolution_meta:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Evolution Meta
        meta:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Meta
        parents:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Parents
        version_id:
          title: Version Id
          type: string
        version_number:
          title: Version Number
          type: integer
      required:
      - version_id
      - entity_id
      - version_number
      - created_at
      - content
      title: VersionDetail
      type: object
    VersionInfo:
      properties:
        author:
          anyOf:
          - type: string
          - type: 'null'
          title: Author
        change_summary:
          anyOf:
          - type: string
          - type: 'null'
          title: Change Summary
        created_at:
          format: date-time
          title: Created At
          type: string
        entity_id:
          title: Entity Id
          type: string
        evolution_meta:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Evolution Meta
        parents:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Parents
        version_id:
          title: Version Id
          type: string
        version_number:
          title: Version Number
          type: integer
      required:
      - version_id
      - entity_id
      - version_number
      - created_at
      title: VersionInfo
      type: object
    VersionScore:
      description: 'A single version''s score on a chosen objective, plus its delta

        against the baseline channel.


        Returned inside :class:`DifferentialChannelView.winners`. The list

        is sorted by ``value`` (descending by default), so consumers can

        render "top N improvements" without a client-side sort.'
      properties:
        author:
          anyOf:
          - type: string
          - type: 'null'
          title: Author
        change_summary:
          anyOf:
          - type: string
          - type: 'null'
          title: Change Summary
        created_at:
          format: date-time
          title: Created At
          type: string
        delta:
          description: '``value`` minus the baseline channel''s value. Always positive
            for entries in :class:`DifferentialChannelView.winners` (strict ``>``
            filter).'
          title: Delta
          type: number
        value:
          description: The version's recorded value for the requested objective.
          title: Value
          type: number
        version_id:
          title: Version Id
          type: string
        version_number:
          title: Version Number
          type: integer
      required:
      - version_id
      - version_number
      - value
      - delta
      - created_at
      title: VersionScore
      type: object
info:
  description: 'Persistent memory for CARL artifacts: steps, chains, agents, memory
    cards'
  title: GigaEvo Memory Module
  version: 0.1.1
openapi: 3.1.0
paths:
  /health:
    get:
      description: "Check health of API and all dependencies.\n\nBeyond the binary\
        \ ``ok | degraded`` status, the payload now\nincludes connection-pool stats,\
        \ redis client counts, and live\nentity counts \u2014 what CARE's TUI status\
        \ bar consumes for live\noperational visibility."
      operationId: health_check_health_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Health Check
  /v1/agent-skills:
    get:
      description: 'List agent_skills with CARE library sort/filter knobs.


        Authenticated callers without an explicit ``?namespace`` are

        auto-scoped to ``auth.owner`` (mirrors writes-side auto-scoping;

        bypass with the ``read:any`` scope). Anonymous callers in opt-in

        deployments keep the "list everything" semantics.


        Defaults match the CARE catalogue view: recently-used skills first.'
      operationId: list_agent_skills_v1_agent_skills_get
      parameters:
      - in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 200
          minimum: 1
          title: Limit
          type: integer
      - in: query
        name: offset
        required: false
        schema:
          default: 0
          minimum: 0
          title: Offset
          type: integer
      - description: Keyset-pagination cursor returned by a previous call's `X-Next-Cursor`
          response header. Stable past 10k entities; only valid with the default sort.
        in: query
        name: cursor
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Keyset-pagination cursor returned by a previous call's `X-Next-Cursor`
            response header. Stable past 10k entities; only valid with the default
            sort.
          title: Cursor
      - in: query
        name: channel
        required: false
        schema:
          default: latest
          title: Channel
          type: string
      - description: Field to sort by. Default matches CARE library shape.
        in: query
        name: sort_by
        required: false
        schema:
          default: last_run_at
          description: Field to sort by. Default matches CARE library shape.
          pattern: ^(created_at|last_run_at|run_count|display_name)$
          title: Sort By
          type: string
      - description: Sort direction. Default `desc` so the catalogue shows recently-used
          skills first.
        in: query
        name: sort_dir
        required: false
        schema:
          default: desc
          description: Sort direction. Default `desc` so the catalogue shows recently-used
            skills first.
          pattern: ^(asc|desc)$
          title: Sort Dir
          type: string
      - description: When true, only return skills flagged `favourite=TRUE`.
        in: query
        name: favourites_only
        required: false
        schema:
          default: false
          description: When true, only return skills flagged `favourite=TRUE`.
          title: Favourites Only
          type: boolean
      - description: Filter to skills whose `tags` JSONB array contains ALL listed
          tokens (AND semantics).
        in: query
        name: tags
        required: false
        schema:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: Filter to skills whose `tags` JSONB array contains ALL listed
            tokens (AND semantics).
          title: Tags
      - description: Case-insensitive substring across display_name / name / description.
        in: query
        name: q
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Case-insensitive substring across display_name / name / description.
          title: Q
      - description: Restrict to a single CARE namespace. When omitted and the caller
          is authenticated, the server auto-scopes to ``auth.owner`` unless the caller
          holds the ``read:any`` scope.
        in: query
        name: namespace
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Restrict to a single CARE namespace. When omitted and the caller
            is authenticated, the server auto-scopes to ``auth.owner`` unless the
            caller holds the ``read:any`` scope.
          title: Namespace
      - description: "Restrict to skills whose `allowed_tools` array contains ALL\
          \ listed tokens (AND semantics). Repeat the param to stack constraints:\
          \ `?requires_tool=Read&requires_tool=Write` \u2192 skills that need both\
          \ Read and Write."
        in: query
        name: requires_tool
        required: false
        schema:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: "Restrict to skills whose `allowed_tools` array contains ALL\
            \ listed tokens (AND semantics). Repeat the param to stack constraints:\
            \ `?requires_tool=Read&requires_tool=Write` \u2192 skills that need both\
            \ Read and Write."
          title: Requires Tool
      - description: Drop skills that mention ANY of the listed tokens in their `allowed_tools`.
          Useful for MAGE-side capability lookup when the user doesn't want a skill
          that requires (e.g.) `Bash`.
        in: query
        name: excludes_tool
        required: false
        schema:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: Drop skills that mention ANY of the listed tokens in their
            `allowed_tools`. Useful for MAGE-side capability lookup when the user
            doesn't want a skill that requires (e.g.) `Bash`.
          title: Excludes Tool
      - in: header
        name: X-API-Key
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      - in: header
        name: authorization
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSkillPageResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List Agent Skills
      tags:
      - agent_skills
    post:
      description: 'Create a new agent_skill entity with its first version.


        Authenticated callers that omit ``meta.namespace`` get their writes

        auto-scoped to ``auth.owner`` via the shared

        :func:`default_namespace_for` helper. Anonymous opt-in callers

        keep the request body''s namespace as-is.'
      operationId: create_agent_skill_v1_agent_skills_post
      parameters:
      - in: header
        name: X-API-Key
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      - in: header
        name: authorization
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntityCreateRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSkillResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Create Agent Skill
      tags:
      - agent_skills
  /v1/agent-skills/{agent_skill_id}:
    delete:
      description: Soft-delete an agent_skill.
      operationId: delete_agent_skill_v1_agent_skills__agent_skill_id__delete
      parameters:
      - in: path
        name: agent_skill_id
        required: true
        schema:
          format: uuid
          title: Agent Skill Id
          type: string
      responses:
        '204':
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Delete Agent Skill
      tags:
      - agent_skills
    get:
      description: Get an agent_skill by ID, resolving the channel to a specific version.
      operationId: get_agent_skill_v1_agent_skills__agent_skill_id__get
      parameters:
      - in: path
        name: agent_skill_id
        required: true
        schema:
          format: uuid
          title: Agent Skill Id
          type: string
      - in: query
        name: channel
        required: false
        schema:
          default: latest
          title: Channel
          type: string
      - in: header
        name: if-none-match
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: If-None-Match
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSkillResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Agent Skill
      tags:
      - agent_skills
    patch:
      description: 'Partial update of CARE-mutable entity-level fields.


        Mutates ``display_name`` / ``description`` / ``tags`` / ``favourite``

        on the entity row without creating a new version. CARE uses this

        when the user renames a skill or toggles its favourite/tags from

        the catalogue screen.'
