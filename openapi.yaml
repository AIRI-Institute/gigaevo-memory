  /v1/maintenance/clear-all:
    post:
      description: "Soft-delete all entities, optionally filtered by type.\n\n**Destructive\
        \ \u2014 protected by two independent guards:**\n\n1. ``auth.require_scope(\"\
        clear:all\")`` \u2014 the caller must hold the\n   ``clear:all`` scope. Anonymous\
        \ opt-in callers always 403 here\n   (empty scope set); a personal-key holder\
        \ without the scope\n   also 403s. Only the deployment admin (or an explicitly-issued\n\
        \   maintenance key) can reach the handler body.\n2. ``X-Confirm: yes-i-really-mean-it``\
        \ header \u2014 even when the\n   caller has the scope, the phrase must be\
        \ typed verbatim so a\n   fat-fingered `curl` can't wipe CARE's library by\
        \ accident.\n\nThe scope check runs **first** so unauthorised callers don't\
        \ even\nlearn whether the X-Confirm token matches.\n\nArgs:\n    entity_type:\
        \ Optional entity type to clear (step, chain, agent,\n        agent_skill,\
        \ memory_card). If not provided, clears all\n        entity types.\n\nReturns:\n\
        \    Dictionary with counts of deleted entities per type.\n\nRaises:\n   \
        \ HTTPException 403 Forbidden: when the caller lacks ``clear:all``.\n    HTTPException\
        \ 412 Precondition Failed: when ``X-Confirm`` is\n        missing or has the\
        \ wrong value.\n    HTTPException 400 Bad Request: when ``entity_type`` is\
        \ invalid."
      operationId: clear_all_entities_v1_maintenance_clear_all_post
      parameters:
      - in: query
        name: entity_type
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Entity Type
      - in: header
        name: X-Confirm
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Confirm
      - in: header
        name: X-API-Key
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      - in: header
        name: authorization
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Clear All Entities
      tags:
      - entities (deprecated)
